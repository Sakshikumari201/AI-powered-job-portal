[build]
  command = "npm run build"
  publish = "client/dist"
  functions = "server/netlify"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pdf-parse", "mammoth", "natural"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
